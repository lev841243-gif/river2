# Судоходная Компания «Дно» — проксирование на Next.js (PM2, порт 3000).
server {
    server_name new.prokatkaterov.ru prokatkaterov.ru www.prokatkaterov.ru;

    # Один сайт — один адрес. Поддомен остался от staging, www — привычка
    # посетителей; оба склеиваем на основной домен, иначе поисковик увидит
    # три копии сайта и разделит между ними вес.
    # Служебный путь Let's Encrypt редиректить нельзя: проверка домена при
    # продлении сертификата ходит именно сюда, а return на уровне server
    # срабатывает раньше разбора путей. Иначе через 60 дней продление молча
    # сломается, и сайт ляжет с просроченным SSL.
    set $to_main 0;
    if ($host != prokatkaterov.ru) { set $to_main 1; }
    if ($request_uri ~ ^/\.well-known/acme-challenge/) { set $to_main 0; }
    if ($to_main = 1) {
        return 301 https://prokatkaterov.ru$request_uri;
    }

    # Фото лодок весят до 230 КБ, заявки маленькие — с запасом.
    client_max_body_size 20M;

    # Реальный IP клиента: без этого рейт-лимит считал бы всех одним адресом,
    # а source по referer определялся бы неверно.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # $remote_addr, а НЕ $proxy_add_x_forwarded_for: последний дописывает к заголовку
        # от клиента, и подделанный IP оказывается первым в списке — так обходится
        # рейт-лимит. Мы единственный прокси, поэтому реальный IP всегда $remote_addr.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Статика Next.js неизменяемая (в имени файла хэш) — кэшируем надолго.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/new.prokatkaterov.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/new.prokatkaterov.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot






}

server {
    if ($host = www.prokatkaterov.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = prokatkaterov.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = new.prokatkaterov.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name new.prokatkaterov.ru prokatkaterov.ru www.prokatkaterov.ru;
    return 404; # managed by Certbot






}